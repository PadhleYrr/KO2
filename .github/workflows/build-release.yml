name: Build Release APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Download gradle-wrapper.jar (not stored in repo)
      - name: Download gradle-wrapper.jar
        run: |
          mkdir -p gradle/wrapper
          curl -sL "https://github.com/gradle/gradle/raw/v8.7.0/gradle/wrapper/gradle-wrapper.jar" \
            -o gradle/wrapper/gradle-wrapper.jar

      # 4. Grant execute permission
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Decode keystore from secret
      - name: Decode keystore
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

      # 6. Build release APK
      - name: Build release APK
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon --stacktrace

      # 7. Rename APK with version
      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle* | sed 's/.*"\(.*\)".*/\1/' | head -1)
          cp app/build/outputs/apk/release/app-release.apk \
             app/build/outputs/apk/release/GKK-MPPSC-v${VERSION}.apk

      # 8. Upload APK as artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKK-MPPSC-Release-APK
          path: app/build/outputs/apk/release/GKK-MPPSC-*.apk
          retention-days: 30

      # 9. Create GitHub Release (only on version tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/GKK-MPPSC-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
