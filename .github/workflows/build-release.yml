name: Build Release APK

on:
  push:
    branches: [ main ]
    tags:     [ 'v*' ]
  workflow_dispatch:

jobs:
  build:
    name: Build & Sign Release APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Java 17
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      # 3. Regenerate gradle wrapper (fixes missing gradle-wrapper.jar)
      - name: Generate gradle wrapper
        run: gradle wrapper --gradle-version 8.9 --distribution-type bin

      # 4. Grant execute permission
      - name: Grant execute permission
        run: chmod +x gradlew

      # 5. Decode keystore from secret (only if secret is set)
      - name: Decode keystore
        if: ${{ secrets.KEYSTORE_BASE64 != '' }}
        run: |
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > $GITHUB_WORKSPACE/release.jks

      # 6. Build release APK
      - name: Build release APK
        env:
          KEYSTORE_PATH:     ${{ github.workspace }}/release.jks
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS:         ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD:      ${{ secrets.KEY_PASSWORD }}
        run: ./gradlew assembleRelease --no-daemon

      # 7. Rename APK with version (handles both signed and unsigned output names)
      - name: Rename APK
        run: |
          VERSION=$(grep 'versionName' app/build.gradle.kts | sed 's/.*"\(.*\)".*/\1/' | head -1)
          APK_DIR=app/build/outputs/apk/release

          # Find whichever APK was produced
          APK_FILE=$(find "$APK_DIR" -name "*.apk" | head -1)

          if [ -z "$APK_FILE" ]; then
            echo "ERROR: No APK found in $APK_DIR"
            ls -la "$APK_DIR" || true
            exit 1
          fi

          echo "Found APK: $APK_FILE"
          echo "Version: $VERSION"

          cp "$APK_FILE" "$APK_DIR/GKK-MPPSC-v${VERSION}.apk"
          echo "APK_PATH=$APK_DIR/GKK-MPPSC-v${VERSION}.apk" >> $GITHUB_ENV

      # 8. Upload APK as artifact
      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: GKK-MPPSC-Release-APK
          path: app/build/outputs/apk/release/GKK-MPPSC-*.apk
          retention-days: 30

      # 9. Create GitHub Release (only on version tags)
      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        uses: softprops/action-gh-release@v2
        with:
          files: app/build/outputs/apk/release/GKK-MPPSC-*.apk
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
